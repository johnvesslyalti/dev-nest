services:
  dev-nest:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - POSTGRES_URL=postgresql://postgres:password123@postgres:5433/devnest?schema=public
      - REDIS_URL=redis://redis:6379
      - ACCESS_SECRET=dev_acc_secret
      - REFRESH_SECRET=dev_ref_secret
      - GOOGLE_CLIENT_ID=test
      - GOOGLE_CLIENT_SECRET=test
      - GOOGLE_CALLBACK_URL=http://localhost:3000/api/v1/auth/google/callback
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: devnest
    ports:
      - "5433:5432"   # only expose postgres for local access
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: