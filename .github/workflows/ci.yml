name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_URL: postgresql://postgres:password@localhost:5432/devnest_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: worldwar3
      REFRESH_TOKEN_SECRET: helloworld

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run generate

      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Validate Prisma Schema
        run: npx prisma validate --schema=./prisma/postgres/schema.prisma || (echo "Schema validation failed" && exit 1)

      - name: Run end-to-end tests
        run: npm run test:e2e
