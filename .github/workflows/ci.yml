name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run generate

      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Validate Prisma Schema
        run: npx prisma validate --schema=./prisma/postgres/schema.prisma || (echo "Schema validation failed" && exit 1)

      - name: Run end-to-end tests
        run: npm run test:e2e
