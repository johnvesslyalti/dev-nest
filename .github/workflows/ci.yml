name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests and Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: devnest_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d devnest_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      NODE_ENV: test
      PORT: 3001
      POSTGRES_URL: postgresql://postgres:password123@localhost:5432/devnest_test?schema=public
      REDIS_URL: redis://localhost:6379
      ACCESS_SECRET: ci_access_secret
      REFRESH_SECRET: ci_refresh_secret
      GOOGLE_CLIENT_ID: ci_google_client_id
      GOOGLE_CLIENT_SECRET: ci_google_client_secret
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/v1/auth/google/callback
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore CI caches
        uses: actions/cache@v4
        with:
          path: |
            .eslintcache
            .tsbuildinfo
          key: ${{ runner.os }}-ci-${{ hashFiles('package-lock.json', 'tsconfig.json', 'eslint.config.mjs') }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ci-${{ hashFiles('package-lock.json', 'tsconfig.json', 'eslint.config.mjs') }}-
            ${{ runner.os }}-ci-

      - name: Install dependencies
        run: npm ci

      - name: Verify code quality and build
        run: npm run test:ci

      - name: Apply database migrations
        run: npm run migrate:deploy

      - name: Run end-to-end tests
        run: npm run test:e2e:ci
